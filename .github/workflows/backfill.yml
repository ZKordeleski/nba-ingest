name: Season Backfill

# Manually triggered backfill of one NBA season. Wall time ~4.5h for a full
# regular season + playoffs (1,230 + ~85 games × 4 fetches × 3s crawl-delay).
# Comfortably under GHA's 6h job limit.
#
# Trigger 3 separate dispatches for full coverage of the JB-to-today gap:
#   - 2023-24  (closes JB's June-2023 cutoff)
#   - 2024-25  (most recent full season)
#   - 2025-26  (current season; playoffs ongoing as of May 2026)

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Season to backfill (e.g., 2023-24). Format: YYYY-YY.'
        required: true
        default: '2023-24'
      dates:
        description: 'Optional date range override (YYYY-MM-DD,YYYY-MM-DD). Overrides season.'
        required: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h 50m, safely under GHA's 6h hard limit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Backfill
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ZK_NBA
          BACKFILL_SEASON: ${{ inputs.season }}
          BACKFILL_DATES: ${{ inputs.dates }}
        run: python -m nba_ingest.jobs.backfill
