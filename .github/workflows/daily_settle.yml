name: Daily Settle

on:
  # schedule:
  #   - cron: '30 8 * * *'  # 8:30 UTC = ~3:30am ET. All games (including late West Coast) are final by then.
  #   Enable after manual dispatch validation (see docs/SETUP.md §10).
  workflow_dispatch:
    inputs:
      settle_date:
        description: 'Date to settle (YYYY-MM-DD). Leave blank for yesterday.'
        required: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Settle games
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ZK_NBA
          SETTLE_DATE: ${{ inputs.settle_date }}
        run: python -m nba_ingest.jobs.daily_settle
