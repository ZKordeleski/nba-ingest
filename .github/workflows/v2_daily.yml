name: V2 Daily Settle

# Cutover-correct daily ingest for ZK_NBA_V2 — the replacement for the V1
# daily_settle cron (which carries the LEFT(game_id,1) bug). Settles the last 2
# days (catches late-posted box scores) through the shared v2 spine: correct
# season_type/round, bad-data guard, NULL discipline. Checkpoint => safe re-runs.
#
# ACTIVE daily cron (2026-06-22): this is now the sole daily ingest — the V1
# daily_settle cron was retired and deleted. ZK_NBA_V2 is the actively-maintained DB;
# the ZK_NBA_V2 -> ZK_NBA rename remains a separate, deliberate step (tracked in
# REBUILD_PLAN). Settling into V2 before the rename is correct: the rename just swaps
# the name, and V2 stays current in the meantime.

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:
    inputs:
      days:
        description: 'Settle the last N days'
        required: false
        default: '2'

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e .
      - name: Settle recent games
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ZK_NBA_V2
        # `inputs.days` only exists on workflow_dispatch; on the schedule trigger it is
        # empty, so fall back to 2 (the dispatch default) to keep `--days` well-formed.
        run: python dev/_settle.py --days ${{ inputs.days || '2' }}
